<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="230" fill="#040212" stroke="url(#glowGrad)" stroke-width="12" filter="url(#glow)" />
  <!-- Stylish 'M' and trend arrow combined -->
  <path d="M140 340 V180 L220 270 L260 220 L330 310" stroke="url(#glowGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M330 310 L372 172 L260 172" stroke="url(#glowGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <circle cx="372" cy="172" r="16" fill="#ec4899" />
</svg>
